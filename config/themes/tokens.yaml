# config/themes/tokens.yaml
# GIR-inspired institutional aesthetic. Single source of truth for all themes.
# Series blues are named by role; each variant resolves role → shade.

default_variant: light

typography:
  sans: "Inter, system-ui, sans-serif"
  mono: "JetBrains Mono, ui-monospace, monospace"
  serif: "Source Serif Pro, Georgia, serif"
  scale:
    xs: 11
    sm: 12
    base: 14
    md: 16
    lg: 18
    xl: 22
    title: 28
  weight:
    regular: 400
    medium: 500
    semibold: 600
    bold: 700

# Eight series blues (role -> shade) and categorical palette, colorblind-safe.
# Strokes: actual solid 2.5, reference dotted 1.5, forecast dashed 1.5.
series_strokes:
  actual:     {width: 2.5, dash: null}
  primary:    {width: 2.0, dash: null}
  secondary:  {width: 2.0, dash: null}
  reference:  {width: 1.5, dash: [2, 3]}
  projection: {width: 1.5, dash: [5, 3]}
  forecast:   {width: 1.5, dash: [6, 3]}
  scenario:   {width: 1.2, dash: [3, 3]}
  ghost:      {width: 1.0, dash: [1, 3]}

variants:

  light:
    surface:
      base:       "#FFFFFF"
      panel:      "#F7F8FA"
      border:     "#E2E6EC"
      text:       "#111827"
      text_muted: "#4B5563"
      grid:       "#E5E7EB"
    series_blues:
      actual:     "#0B2545"
      primary:    "#13315C"
      secondary:  "#1E40AF"
      reference:  "#3A6EA5"
      projection: "#5B8AC7"
      forecast:   "#8CB0D9"
      scenario:   "#B3CFE6"
      ghost:      "#DCE7F2"
    semantic:
      primary:   "#13315C"
      positive:  "#4E7A3C"
      negative:  "#8F3031"
      warning:   "#B67B1E"
      info:      "#3A6EA5"
      neutral:   "#6B7280"
      highlight: "#B5892A"
    categorical:
      - "#13315C"
      - "#8F3031"
      - "#4E7A3C"
      - "#B67B1E"
      - "#3A6EA5"
      - "#1E40AF"
      - "#5B8AC7"
      - "#B5892A"
      - "#6B3E91"
      - "#8CB0D9"
      - "#0B2545"
      - "#2F4858"
      - "#B3CFE6"
      - "#D97757"
      - "#4A6670"
      - "#7A7A7A"
      - "#A43E2A"
      - "#45788F"
    diverging:
      negative: "#8F3031"
      neutral:  "#F5EFE6"
      positive: "#13315C"
    chart:
      default_width: 680
      default_height: 320
      title_anchor: "start"

