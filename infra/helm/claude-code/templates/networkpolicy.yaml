{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "claude-code.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "claude-code.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "claude-code.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from the ingress controller only.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressNamespace }}
          podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.ingressPodSelector | nindent 14 }}
      ports:
        - protocol: TCP
          port: 3000
  egress:
    # Allow DNS resolution.
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow HTTPS to external services (Anthropic API, Ollama, etc).
    - ports:
        - protocol: TCP
          port: 443
    # Allow HTTP for internal cluster services (Ollama on port 11434).
    - ports:
        - protocol: TCP
          port: 11434
{{- end }}
