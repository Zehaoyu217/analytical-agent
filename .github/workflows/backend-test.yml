name: Backend Tests

on:
  push:
    branches: [main, feat/*, fix/*]
    paths:
      - "backend/**"
      - ".github/workflows/backend-test.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-test.yml"

defaults:
  run:
    working-directory: backend

jobs:
  unit:
    name: Unit & Skill Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type-check (mypy)
        run: uv run mypy app --ignore-missing-imports
        continue-on-error: true

      - name: Run unit tests + skill tests (no evals)
        run: uv run pytest tests/unit/ app/skills/ -q -m "not slow"

      - name: Run eval L1–L3 (LLM-free checks only)
        # Evals auto-skip when Ollama is unavailable — run them so the
        # collection path is always exercised, even if no judge fires.
        run: uv run pytest tests/evals/test_level1.py tests/evals/test_level2.py tests/evals/test_level3.py -v -m "not slow"

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm tsc --noEmit

      - name: Build
        run: pnpm build
